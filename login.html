<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Subjects Online</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --accent: #7c3aed;
      --glow: rgba(124, 58, 237, 0.4);
      --muted: #94a3b8;
      --surface: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    /* Mesh Gradient Orbs */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .modern-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      mix-blend-mode: screen;
    }

    .orb-1 { width: 600px; height: 600px; background: #4f46e5; top: -10%; left: -10%; animation: orbFloat 25s infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: #7c3aed; bottom: -10%; right: -10%; animation: orbFloat 20s infinite alternate-reverse; }
    .orb-3 { width: 400px; height: 400px; background: #db2777; top: 40%; left: 40%; animation: orbFloat 15s infinite linear; }

    @keyframes orbFloat {
      from { transform: translate(0, 0) scale(1) rotate(0deg); }
      to { transform: translate(100px, 50px) scale(1.2) rotate(180deg); }
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      background: #020617;
      transition: opacity 0.8s ease-in-out;
    }

    .welcome-svg {
      width: 80%;
      max-width: 500px;
      overflow: visible;
    }

    .login-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(1.1);
      transition: opacity 0.8s ease-in-out, transform 0.8s ease-out;
    }

    .login-container.visible {
      opacity: 1;
      transform: scale(1);
    }

    .login-card {
      width: 90%;
      max-width: 480px;
      padding: 50px 40px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    .form-element {
      opacity: 0;
      transform: translateY(20px);
    }

    .login-input-wrap {
      position: relative;
      margin-top: 30px;
    }

    .login-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 20px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .login-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 20px var(--glow);
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      margin: 25px 0;
    }

    .avatar-option {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.05);
      border: 2px solid transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .avatar-option:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.15) rotate(10deg);
    }

    .avatar-option.selected {
      border-color: var(--accent);
      background: var(--accent);
      transform: scale(1.2);
      box-shadow: 0 0 25px var(--glow);
    }

    .custom-avatar-btn {
      grid-column: span 5;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
      margin-top: 5px;
    }

    .custom-avatar-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--accent);
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 16px;
      color: #fff;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
      box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(124, 58, 237, 0.5);
      filter: brightness(1.1);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-animation">
    <div class="modern-orb orb-1"></div>
    <div class="modern-orb orb-2"></div>
    <div class="modern-orb orb-3"></div>
  </div>

  <div class="intro-screen" id="intro-screen">
    <!-- SVG Paths for Welcome (Handwritten style) -->
    <svg class="welcome-svg" viewBox="0 0 500 150">
      <g fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" id="welcome-paths">
        <path d="M50,40 L60,110 L80,60 L100,110 L110,40" />
        <path d="M150,80 C150,60 130,60 130,80 C130,100 150,110 160,100 L130,80" />
        <path d="M180,30 L180,110" />
        <path d="M230,70 C220,60 200,60 200,80 C200,100 220,110 230,100" />
        <path d="M250,80 C250,60 280,60 280,80 C280,100 250,110 250,80" />
        <path d="M300,110 L300,70 C300,50 320,50 320,70 L320,110 L340,70 C340,50 360,50 360,70 L360,110" />
        <path d="M410,80 C410,60 390,60 390,80 C390,100 410,110 420,100 L390,80" />
      </g>
    </svg>
  </div>

  <div class="login-container" id="login-container">
    <div class="login-card">
      <div class="form-element" style="font-size: 50px; margin-bottom: 5px;">🚀</div>
      <h2 class="form-element" style="font-size: 32px; margin: 0 0 10px;">Begin Journey</h2>
      <p class="form-element" style="color: var(--muted); font-size: 15px;">Setup your academic identity</p>

      <div class="login-input-wrap form-element">
        <label style="text-align: left; display: block; color: #94a3b8; font-size: 13px; margin-bottom: 8px; font-weight: 500;">FULL NAME</label>
        <input type="text" id="login-name" class="login-input" placeholder="What should we call you?" maxlength="20">
      </div>

      <div class="form-element" style="margin-top: 25px;">
        <label style="text-align: left; display: block; color: #94a3b8; font-size: 13px; margin-bottom: 5px; font-weight: 500;">CHOOSE AVATAR</label>
        <div class="avatar-grid" id="login-avatar-grid"></div>
      </div>

      <div class="form-element" style="margin-top: 5px;">
        <button class="btn-primary" onclick="handleLoginSubmit()">Enter Universe →</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const settings = typeof getSettings === 'function' ? getSettings() : { name: "" };
      const introSeen = localStorage.getItem("so_welcome_done_final");

      if (settings.name && introSeen) {
        location.href = 'index.html';
        return;
      }

      // Fallback: If intro screen doesn't disappear in 8s, show form anyway
      setTimeout(() => {
        const intro = document.getElementById("intro-screen");
        if (intro && intro.style.display !== "none") {
          intro.style.display = "none";
          const container = document.getElementById("login-container");
          container.style.display = "flex";
          container.classList.add("visible");
          anime({
                targets: '.form-element',
                translateY: [20, 0],
                opacity: [0, 1],
                delay: anime.stagger(100),
                easing: 'easeOutExpo',
                duration: 800
          });
        }
      }, 8000);

      // Initialize dasharray BEFORE starting the animation
      document.querySelectorAll('#welcome-paths path').forEach(p => {
        const len = p.getTotalLength();
        p.style.strokeDasharray = len;
        p.style.strokeDashoffset = len;
      });

      // 1. Welcome Drawing (Snappier)
      anime({
        targets: '#welcome-paths path',
        strokeDashoffset: [anime.setDashoffset, 0],
        easing: 'easeInOutSine',
        duration: 1200,
        delay: anime.stagger(150),
        complete: () => {
          setTimeout(() => {
            // Check if already has a name
            const currentSettings = typeof getSettings === 'function' ? getSettings() : { name: "" };
            
            // Mark as seen
            localStorage.setItem("so_welcome_done_final", "true");

            if (currentSettings.name) {
              location.href = 'index.html';
              return;
            }

            // 2. Transition to Login (Faster)
            const intro = document.getElementById("intro-screen");
            intro.style.opacity = "0";
            
            setTimeout(() => {
              intro.style.display = "none";
              const container = document.getElementById("login-container");
              container.style.display = "flex";
              container.classList.add("visible");

              // 3. Staggered Elements
              anime({
                targets: '.form-element',
                translateY: [20, 0],
                opacity: [0, 1],
                delay: anime.stagger(100),
                easing: 'easeOutExpo',
                duration: 800
              });
            }, 800);
          }, 800); 
        }
      });

      // Avatars and Mouse Parallax
      const grid = document.getElementById("login-avatar-grid");
      const avatars = ["👨‍🎓", "👩‍🎓", "🧠", "📚", "🚀", "✨", "🔥", "💎", "🎯", "🌟"];
      grid.innerHTML = avatars.map((a, i) => `
        <div class="avatar-option ${i === 0 ? "selected" : ""}" data-avatar="${a}" onclick="selectAvatar(this)">${a}</div>
      `).join("") + `
        <div class="custom-avatar-btn" onclick="document.getElementById('login-avatar-upload').click()">
          <span>📁 Custom</span>
          <input type="file" id="login-avatar-upload" hidden accept="image/*">
        </div>
      `;

      document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        document.querySelector('.orb-1').style.transform = `translate(${x * 50}px, ${y * 50}px)`;
        document.querySelector('.orb-2').style.transform = `translate(${x * -30}px, ${y * -30}px)`;
      });

      const uploader = document.getElementById("login-avatar-upload");
      uploader.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (re) => {
            const base64 = re.target.result;
            let preview = grid.querySelector(".avatar-option.custom-preview");
            if (!preview) {
              preview = document.createElement("div");
              preview.className = "avatar-option custom-preview selected";
              grid.insertBefore(preview, grid.querySelector(".custom-avatar-btn"));
            }
            grid.querySelectorAll(".avatar-option").forEach(o => o.classList.remove("selected"));
            preview.classList.add("selected");
            preview.dataset.avatar = base64;
            preview.innerHTML = `<img src="${base64}" alt="custom" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
          };
          reader.readAsDataURL(file);
        }
      };
    });

    function selectAvatar(el) {
      document.querySelectorAll(".avatar-option").forEach(o => o.classList.remove("selected"));
      el.classList.add("selected");
    }
  </script>
</body>
</html>
